services:
  - type: web
    name: dplab-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dplab-postgres
          property: connectionString
      - key: FRONTEND_URL
        sync: false

databases:
  - name: dplab-postgres
    plan: free
